<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Double Hit Collectibles project page for 0x00C0DE.github.io.">
    <title>Double Hit Collectibles</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0e1014;
            --panel: #171b22;
            --text: #f4f7fb;
            --muted: #9aa6b2;
            --accent: #f4b860;
            --border: #283243;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(244, 184, 96, 0.18), transparent 30%),
                linear-gradient(180deg, #121620 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(720px, 100%);
            padding: 40px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(23, 27, 34, 0.92);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        p {
            margin: 0 0 16px;
            line-height: 1.7;
            color: var(--muted);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.05;
        }

        a {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main>
        <p>Project page</p>
        <h1>Double Hit Collectibles</h1>
        <p>
            This is the initial landing page for the Double Hit Collectibles section of the site.
            It is now tracked by git and ready to evolve into a dedicated project page.
        </p>
        <p>
            <a href="/">Return to 0x00C0DE.github.io</a>
        </p>
    </main>
</body>
</html>
